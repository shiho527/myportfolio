    <meta charset="utf-8" />

  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <a href="index.html">
          <h1 class="logo">mame</h1>
        </a>

        <!-- ハンバーガー -->
        <div class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <nav class="nav">
          <ul>
            <li><a href="index.html">TOP</a></li>
            <li><a href="in#about">ABOUT</a></li>
            <li><a href="index.html#works">WORKS</a></li>
            <li><a href="index.html#skill">SKILL</a></li>
            <li><a href="#">CONTACT</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ===== Contact ===== -->
    <section class="contact">
      <div class="contact-inner">
        <!-- タイトル -->
        <div class="contact-heading">
          <h2>CONTACT</h2>
          <p>お問い合わせ</p>
        </div>

        <!-- フォーム -->
        <form class="contact-form">
          <div class="form-item">
            <label>お名前</label>
            <input type="text" name="name" required />
          </div>

          <div class="form-item">
            <label>メールアドレス</label>
            <input type="email" name="email" required />
          </div>

          <div class="form-item">
            <label>お問い合わせ内容</label>
            <textarea name="message" rows="5" required></textarea>
          </div>

          <div class="form-submit">
            <button type="submit">送信する</button>
          </div>
        </form>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <!-- 上段 -->
        <div class="footer-top">
          <!-- ロゴ -->
          <div class="footer-logo">
            <a href="index.html">
              <p>mame</p>
            </a>
          </div>

          <!-- ナビ -->

          <!-- SNS -->

              href="https://www.instagram.com/_mame5555?igsh=YThjaHd5Mjh5M2Q2&utm_source=qr"
              ><i class="fa-brands fa-instagram"></i
            ></a>
            <a href="https://www.threads.com/@_mame5555?igshid=NTc4MTIwNjQ2YQ=="
              ><i class="fa-brands fa-threads"></i
            ></a>
            <a href="https://x.com/__mame5555?s=21&t=Xrj8gj-cx_z5ETrhMC7AMg"
              ><i class="fa-brands fa-x-twitter"></i
            ></a>

        </div>

        <!-- 線 -->
        <div class="footer-line"></div>

        <!-- コピー -->
        <div class="footer-copy">
          <p>© 2026 mame portfolio. All rights reserved.</p>
        </div>
